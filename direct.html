<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Stok</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
  <link rel="preload" as="image" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRoTNL2Jk0oNIKQaFM6wPSTlLwEUQzYqTV7Gw&s">
</head>
<body>
  

  <main class="container my-4">
    <div id="input-card" class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Tarik Stok</h5>
      </div>
      <div id="collapsePilihToko" class="collapse show">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-5">
              <label for="branch" class="form-label">Kode Cabang</label>
              <input type="text" id="branch" class="form-control" placeholder="Masukkan kode cabang...">
            </div>
            <div class="col-md-5">
              <label for="store" class="form-label">Cari Toko</label>
              <div class="position-relative">
                <input type="text" id="store" class="form-control" placeholder="Masukkan kode toko..." autocomplete="off">
              </div>
            </div>
            <div class="col-md-2">
              <button id="downloadLaporan" class="btn btn-primary w-100">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                Download
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="result-card" class="card mt-4" style="display: none;">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 id="judulStok" class="mb-0">Status</h5>
      </div>
      <div id="cardList" class="card-body">
        <!-- Hasil tabel atau pesan loading/error muncul di sini -->
      </div>
    </div>
  </main>

  <footer class="text-center text-muted py-4">
    <p>&copy; 2025 - Dibuat untuk kemudahan bersama. 😎😎</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <!-- XLSX JS for Excel Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="direct.js"></script>

  <!-- Global Loading Overlay -->
  <div id="globalLoadingOverlay" style="display: none;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="progress mt-3" style="width: 80%; height: 25px;">
      <div id="globalProgressBarInner" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;"><span class="progress-bar-text"></span></div>
    </div>
    <p id="globalProgressMessage" class="text-white mt-2">Memuat...</p>
  </div>
</body>
</html>
