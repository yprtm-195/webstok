<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
  <link rel="preload" as="image" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRoTNL2Jk0oNIKQaFM6wPSTlLwEUQzYqTV7Gw&s">
</head>
<body>
  

  <main class="container my-4">
        <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#collapsePilihToko" aria-expanded="true" aria-controls="collapsePilihToko" style="cursor: pointer;">
        <h5 class="mb-0">Cek Stok per Toko</h5>
        <i id="collapseIcon" class="bi bi-chevron-down"></i>
      </div>
      <div id="collapsePilihToko" class="collapse show">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-5">
              <label for="branch" class="form-label">Pilih Cabang</label>
              <select id="branch" class="form-select">
                <option selected disabled value="">Loading Cabang...</option>
              </select>
            </div>
            <div class="col-md-5">
              <label for="store" class="form-label">Cari Toko</label>
              <div class="position-relative">
                <input type="text" id="store" class="form-control" placeholder="Cari kode toko atau Nama toko..." autocomplete="off" disabled>
                <div id="autocomplete-list" class="list-group autocomplete-list"></div>
              </div>
            </div>
            <div class="col-md-2">
              <button id="cekStok" class="btn btn-primary w-100">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                Cek Stok
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-4">
      <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#collapseMultiToko" aria-expanded="false" aria-controls="collapseMultiToko" style="cursor: pointer;">
        <h5 class="mb-0">Cek Stok Multi Toko</h5>
        <i id="collapseMultiIcon" class="bi bi-chevron-down"></i>
      </div>
      <div id="collapseMultiToko" class="collapse">
        <div class="card-body">
          <div class="row g-2 align-items-start">
            <div class="col-md-4">
              <label for="multiBranch" class="form-label">Pilih Cabang</label>
              <select id="multiBranch" class="form-select">
                <option selected disabled value="">Loading Cabang...</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="multiStoreCodes" class="form-label">Kode Toko (CSV)</label>
              <textarea id="multiStoreCodes" class="form-control" rows="3" placeholder="Input kode toko, pisahin pake koma"></textarea>
            </div>
            <div class="col-md-2">
              <button id="cekStokMulti" class="btn btn-primary w-100">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                Cek Stok Multi
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="result-card" class="card mt-4" style="display: none;">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 id="judulStok" class="mb-0">Hasil Stok</h5>
      </div>
      <div class="d-flex justify-content-end gap-2 px-4 py-3 border-bottom">
          <button id="downloadExcel" class="btn btn-success btn-sm"><i class="bi bi-file-earmark-excel-fill me-1"></i> Excel</button>
          <button id="downloadCsv" class="btn btn-info btn-sm"><i class="bi bi-file-earmark-spreadsheet-fill me-1"></i> CSV</button>
      </div>
      <div id="cardList" class="card-body">
        <!-- Hasil tabel atau pesan loading/error muncul di sini -->
      </div>
    </div>

    <div id="multi-result-card" class="card mt-4" style="display: none;">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Hasil Cek Stok Multi Toko</h5>
      </div>
      <div class="card-body">
        <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
          <label for="multiStoreSearch" class="form-label mb-0">Cari Toko Hasil</label>
          <div class="position-relative flex-grow-1">
            <input type="text" id="multiStoreSearch" class="form-control" placeholder="Cari kode atau nama toko..." autocomplete="off">
            <div id="multi-autocomplete-list" class="list-group autocomplete-list"></div>
          </div>
          <button id="downloadMultiExcel" class="btn btn-success btn-sm"><i class="bi bi-file-earmark-excel-fill me-1"></i> Excel</button>
        </div>
        <div id="multiCardList">
          <!-- Multi-store results will be displayed here -->
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center text-muted py-4">
    <p>&copy; 2025 - Dibuat untuk kemudahan bersama. 😎😎😎</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <!-- XLSX JS for Excel Download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="script.js"></script>

  <!-- Global Loading Overlay -->
  <div id="globalLoadingOverlay" style="display: none;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="progress mt-3" style="width: 80%; height: 25px;">
      <div id="globalProgressBarInner" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;"><span class="progress-bar-text"></span></div>
    </div>
    <p id="globalProgressMessage" class="text-white mt-2">Memuat...</p>
  </div>
</body>
</html>
